<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待ち時間モニター</title>
<!-- monitor.html V2.0 - エリア配色・件数可変サイズ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0c12;
    color: #e8eaf0;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: stretch;
    height: 100vh;
  }
  .left-col {
    flex: 0 0 38%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 8px;
    border-right: 2px solid #2e3248;
  }
  .right-col {
    flex: 0 0 62%;
    display: flex;
    flex-direction: column;
    padding: 16px 20px;
    overflow-y: auto;
    gap: 12px;
  }
  .label {
    font-size: clamp(18px, 3vw, 40px);
    font-weight: 500;
    color: #a0a8c8;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
    text-align: center;
  }
  .value {
    font-size: clamp(120px, 28vw, 320px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -4px;
    transition: opacity 0.4s;
    text-align: center;
  }
  .unit {
    font-size: clamp(24px, 5vw, 64px);
    font-weight: 400;
    color: #7b80a0;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    text-align: center;
  }
  .divider {
    width: clamp(40px, 6vw, 80px);
    height: 2px;
    background: #2e3248;
    margin: 10px auto;
    border-radius: 1px;
  }
  .count-value { color: #4f8ef7; }
  .time-value  { color: #e8eaf0; }
  .value.zero  { color: #3a3e55; }
  @keyframes flash {
    0%   { opacity: 0.4; }
    100% { opacity: 1; }
  }
  .flash { animation: flash 0.35s ease-out; }
  .queue-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    border: 2px solid #2a4a7f;
    border-radius: 16px;
    padding: 16px 18px;
    min-height: 0;
    background: #0d1829;
  }
  .queue-section-label {
    font-size: clamp(18px, 2.6vw, 34px);
    font-weight: 600;
    color: #7ab3f7;
    letter-spacing: 0.15em;
    text-align: center;
    margin-bottom: 14px;
  }
  .queue-list {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    flex: 1;
    align-content: flex-start;
  }
  .queue-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #112240;
    border: 1px solid #2a4a7f;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: clamp(32px, 4.5vw, 64px);
    font-weight: 700;
    color: #e8f0ff;
    transition: font-size 0.3s;
  }
  /* 件数少ない時に大きく */
  .queue-item.size-lg {
    font-size: clamp(48px, 7vw, 100px);
    padding: 16px 28px;
  }
  .queue-item.size-xl {
    font-size: clamp(64px, 10vw, 140px);
    padding: 20px 36px;
  }
  .ready-section {
    border: 2px solid #c67c00;
    border-radius: 16px;
    padding: 14px 18px;
    background: #1a1000;
  }
  .ready-section-label {
    font-size: clamp(18px, 2.6vw, 34px);
    font-weight: 600;
    color: #f5a623;
    letter-spacing: 0.15em;
    text-align: center;
    margin-bottom: 12px;
  }
  .ready-list {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .ready-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #2d1800;
    border: 1px solid #c67c00;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: clamp(32px, 4.5vw, 64px);
    font-weight: 700;
    color: #f5a623;
    transition: font-size 0.3s;
  }
  .ready-item.size-lg {
    font-size: clamp(48px, 7vw, 100px);
    padding: 16px 28px;
  }
  .ready-item.size-xl {
    font-size: clamp(64px, 10vw, 140px);
    padding: 20px 36px;
  }
  .badge-ippoka {
    font-size: clamp(13px, 1.8vw, 24px);
    background: #4f8ef7;
    color: #fff;
    border-radius: 6px;
    padding: 3px 12px;
    font-weight: 500;
  }
  .queue-note {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #2e3248;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .queue-note .order-note {
    font-size: clamp(18px, 2.6vw, 36px);
    color: #c8d8f8;
    display: block;
    line-height: 1.5;
  }
  .queue-note .ippoka-note {
    font-size: clamp(17px, 2.4vw, 32px);
    color: #7ab3f7;
    display: block;
    line-height: 1.5;
  }
  .conn {
    position: fixed;
    bottom: 16px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #3a3e55;
  }
  .conn-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #2ecc71;
    animation: blink 3s infinite;
  }
  .conn-dot.err { background: #e74c3c; animation: none; }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }
</style>
</head>
<body>

<!-- 左カラム：待ち人数・目安時間 -->
<div class="left-col">
  <div class="label">現在の待ち人数</div>
  <div class="value count-value" id="countVal">0</div>
  <div class="unit">名</div>

  <div class="divider"></div>

  <div class="label">目安待ち時間</div>
  <div class="value time-value" id="timeVal">0</div>
  <div class="unit">分</div>
</div>

<!-- 右カラム：調剤中 -->
<div class="right-col">
  <div class="ready-section" id="readySection" style="display:none">
    <div class="ready-section-label">🟡 お受け取り可能</div>
    <div class="ready-list" id="readyList"></div>
  </div>

  <div class="queue-section">
    <div class="queue-section-label">調剤中</div>
    <div class="queue-list" id="queueList"></div>
    <div class="queue-note">
      <span class="order-note">受付順に調剤していますが、処方内容により順番が前後する場合があります</span>
      <span class="ippoka-note">🔵 のついた番号はお時間をいただくため、さらに前後する場合があります</span>
    </div>
  </div>
</div>

<div class="conn">
  <div class="conn-dot" id="connDot"></div>
  <span id="connLabel">接続中</span>
</div>

<script>
const SUPABASE_URL = 'https://jcveasjdfcymxnmbbvka.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjdmVhc2pkZmN5bXhubWJidmthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NzE3NjksImV4cCI6MjA5MzQ0Nzc2OX0.xAKRFNjf5kkyf3kUjTJtprIrYaIpa80DHx2L4KEkYDg';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const DEFAULT_BASE = 10;
const DEFAULT_ADD  = 5;
let cachedSettings = { baseMin: DEFAULT_BASE, addMin: DEFAULT_ADD };

async function loadSettings() {
  const { data } = await sb.from('settings').select('key, value');
  if (data && data.length > 0) {
    data.forEach(r => {
      if (r.key === 'base_min') cachedSettings.baseMin = parseInt(r.value) || DEFAULT_BASE;
      if (r.key === 'add_min')  cachedSettings.addMin  = parseInt(r.value) || DEFAULT_ADD;
    });
  }
}

function flash(el) {
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

function update(queue) {
  const today = new Date().toISOString().slice(0, 10);
  const waiting = queue.filter(r =>
    r.status === 'waiting' &&
    r.created_at.slice(0, 10) === today
  );

  const s = cachedSettings;
  const count = waiting.length;
  const totalMin = waiting.reduce((sum, r) =>
    sum + s.baseMin + (r.is_ippoka ? s.addMin : 0), 0
  );

  const countEl = document.getElementById('countVal');
  const timeEl  = document.getElementById('timeVal');

  countEl.textContent = count;
  timeEl.textContent  = totalMin;

  countEl.className = 'value count-value' + (count === 0 ? ' zero' : '');
  timeEl.className  = 'value time-value'  + (totalMin === 0 ? ' zero' : '');

  flash(countEl);
  flash(timeEl);

  // 受取待ちリスト更新
  const ready = queue.filter(r =>
    r.status === 'ready' &&
    r.created_at.slice(0, 10) === today
  );
  const readySection = document.getElementById('readySection');
  const readyListEl  = document.getElementById('readyList');
  readySection.style.display = ready.length > 0 ? 'block' : 'none';
  readyListEl.innerHTML = '';
  const rSize = ready.length <= 1 ? 'size-xl' : ready.length <= 3 ? 'size-lg' : '';
  ready.forEach(r => {
    const item = document.createElement('div');
    item.className = 'ready-item' + (rSize ? ' ' + rSize : '');
    item.innerHTML = String(r.ticket_no).padStart(3, '0') +
      (r.is_ippoka ? '<span class="badge-ippoka">🔵 一包化</span>' : '');
    readyListEl.appendChild(item);
  });

  // 調剤中リスト更新
  const listEl = document.getElementById('queueList');
  listEl.innerHTML = '';
  const qSize = waiting.length <= 1 ? 'size-xl' : waiting.length <= 3 ? 'size-lg' : '';
  waiting.forEach(r => {
    const item = document.createElement('div');
    item.className = 'queue-item' + (qSize ? ' ' + qSize : '');
    item.innerHTML =
      String(r.ticket_no).padStart(3, '0') +
      (r.is_ippoka ? '<span class="badge-ippoka">🔵 一包化</span>' : '');
    listEl.appendChild(item);
  });
}

async function init() {
  await loadSettings();

  const { data, error } = await sb
    .from('waiting_queue')
    .select('*')
    .order('created_at', { ascending: true });

  if (error) {
    document.getElementById('connDot').classList.add('err');
    document.getElementById('connLabel').textContent = '接続エラー';
    return;
  }

  update(data || []);

  sb.channel('wm-monitor')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'waiting_queue' },
      async () => {
        const { data: fresh } = await sb
          .from('waiting_queue')
          .select('*')
          .order('created_at', { ascending: true });
        update(fresh || []);
      }
    )
    .subscribe(status => {
      const dot   = document.getElementById('connDot');
      const label = document.getElementById('connLabel');
      if (status === 'SUBSCRIBED') {
        dot.classList.remove('err');
        label.textContent = '接続中';
      } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
        dot.classList.add('err');
        label.textContent = '再接続中...';
      }
    });
}

init();
</script>
</body>
</html>
